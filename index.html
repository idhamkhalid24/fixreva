<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rocky Hijab — POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --transition-theme: background 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
        [data-theme="dark"] {
            --bg: #0a0d14; --bg2: #0f1420; --bg3: #141a2a;
            --surface: rgba(255,255,255,0.04); --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.07); --border-focus: rgba(99,155,255,0.5);
            --text: #eef2ff; --text-soft: #7a85a0; --text-ghost: #3a4258;
            --accent: #5b8fff; --accent-dim: rgba(91,143,255,0.15); --accent-glow: rgba(91,143,255,0.25);
            --green: #52d89e; --green-dim: rgba(82,216,158,0.12);
            --red: #ff6b6b; --red-dim: rgba(255,107,107,0.12);
            --amber: #ffc46b; --amber-dim: rgba(255,196,107,0.12);
            --nav-bg: rgba(10,13,20,0.92); --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg: #f0f2f8; --bg2: #ffffff; --bg3: #f7f8fc;
            --surface: rgba(0,0,0,0.03); --surface-hover: rgba(0,0,0,0.055);
            --border: rgba(0,0,0,0.07); --border-focus: rgba(64,120,240,0.4);
            --text: #0f1523; --text-soft: #5c6478; --text-ghost: #aab0c0;
            --accent: #3b6df0; --accent-dim: rgba(59,109,240,0.1); --accent-glow: rgba(59,109,240,0.2);
            --green: #18a96b; --green-dim: rgba(24,169,107,0.1);
            --red: #e84545; --red-dim: rgba(232,69,69,0.1);
            --amber: #e8960a; --amber-dim: rgba(232,150,10,0.1);
            --nav-bg: rgba(255,255,255,0.92); --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh; transition: var(--transition-theme);
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; overflow-x: hidden; }
        #loading { position: fixed; inset: 0; background: rgba(10,13,20,0.7); backdrop-filter: blur(16px); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
        .loader-ring { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-8px) scale(0.95); z-index: 300; padding: 10px 18px; border-radius: 100px; font-size: 12.5px; font-weight: 600; opacity: 0; transition: all 0.22s cubic-bezier(.34,1.5,.64,1); white-space: nowrap; max-width: calc(100% - 40px); text-align: center; pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        .modal-wrap { position: fixed; inset: 0; background: rgba(5,8,16,0.75); backdrop-filter: blur(14px); z-index: 150; display: none; align-items: flex-end; justify-content: center; }
        .modal-wrap.show { display: flex; animation: fadeIn 0.2s ease; }
        .modal-sheet { background: var(--bg2); border: 1px solid var(--border); border-top: none; border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; padding: 20px 20px 40px; animation: slideUp 0.28s cubic-bezier(.32,1.15,.64,1); box-shadow: var(--shadow); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-sheet-center { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; width: calc(100% - 40px); max-width: 360px; padding: 24px 20px; animation: popIn 0.22s cubic-bezier(.34,1.4,.64,1); }
        .modal-ico { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin: 0 auto 14px; }
        #bottom-nav { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); width: calc(100% - 28px); max-width: 402px; background: var(--nav-bg); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; height: 62px; z-index: 100; padding: 0 6px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 14px; border-radius: 14px; transition: all 0.18s ease; cursor: pointer; background: none; border: none; color: var(--text-ghost); min-width: 52px; }
        .nav-item i { font-size: 17px; }
        .nav-item span { font-size: 8.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        .nav-item.active { background: var(--accent-dim); color: var(--accent); }
        #page-content { position: relative; z-index: 1; padding-bottom: 96px; }
        .page-pad { padding: 0 18px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; transition: background 0.15s; }
        .stat-hero { background: linear-gradient(140deg, var(--bg3) 0%, var(--bg2) 100%); border: 1px solid var(--border); border-radius: 18px; padding: 22px 20px; position: relative; overflow: hidden; }
        .stat-mini { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 14px; text-align: center; }
        .stat-mini-num { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1.1; }
        .stat-mini-lbl { font-size: 9.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-ghost); margin-bottom: 5px; }
        .bonus-card { border: 1px solid rgba(255,196,107,0.18); border-radius: 16px; padding: 18px 20px; position: relative; overflow: hidden; background: var(--amber-dim); }
        .page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.025em; }
        .page-subtitle { font-size: 12.5px; color: var(--text-soft); margin-top: 2px; }
        .label-xs { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-ghost); margin-bottom: 10px; }
        .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
        .g-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.18s; }
        .g-input:focus { border-color: var(--border-focus); background: var(--accent-dim); }
        .btn { border: none; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; transition: all 0.14s ease; display: inline-flex; align-items: center; justify-content: center; gap: 7px; letter-spacing: 0.01em; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; border-radius: 12px; box-shadow: 0 4px 18px var(--accent-glow); }
        .btn-glass { background: var(--surface); border: 1px solid var(--border) !important; border-radius: 12px; color: var(--text-soft); }
        .btn-danger { background: var(--red-dim); border: 1px solid rgba(255,107,107,0.2) !important; color: var(--red); border-radius: 10px; }
        .btn-success { background: linear-gradient(135deg, #16a34a, #15803d); color: white; border-radius: 12px; }
        .absen-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; transition: all 0.18s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-group { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 3px; display: flex; gap: 2px; }
        .tab-btn { flex: 1; padding: 8px 4px; border-radius: 9px; font-size: 11px; font-weight: 600; color: var(--text-ghost); background: none; border: none; cursor: pointer; transition: all 0.18s ease; }
        .tab-btn.active { background: var(--accent); color: white; }
        .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 100px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .badge-blue { background: var(--accent-dim); color: var(--accent); }
        .badge-green { background: var(--green-dim); color: var(--green); }
        .trx-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 13px 15px; display: flex; align-items: center; gap: 13px; }
        .trx-icon { width: 38px; height: 38px; background: var(--accent-dim); border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .trx-amount { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
        .trx-note { font-size: 11.5px; color: var(--text-soft); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 155px; }
        .trx-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-ghost); margin-top: 3px; }
        .setting-row { display: flex; align-items: center; gap: 13px; padding: 13px 15px; background: var(--bg2); border: 1px solid var(--border); border-radius: 13px; cursor: pointer; width: 100%; }
        .avatar-ring { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #818cf8); display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; margin: 0 auto; }
        .online-dot::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .loc-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
        .loc-in { background: var(--green-dim); color: var(--green); }
        .loc-out { background: var(--red-dim); color: var(--red); }
        .loc-loading { background: var(--surface); color: var(--text-ghost); }
        .theme-toggle { width: 38px; height: 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; }
        .login-brand { width: 78px; height: 78px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; background: linear-gradient(135deg, #1a2a50 0%, #0d1830 100%); }
        .page-in { animation: pageIn 0.22s ease both; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .s1 { animation-delay: 0.04s; } .s2 { animation-delay: 0.08s; } .s3 { animation-delay: 0.12s; } .s4 { animation-delay: 0.16s; }
        .row-between { display: flex; justify-content: space-between; align-items: center; }
        .sync-btn { padding: 7px 12px; background: var(--accent-dim); border: 1px solid rgba(91,143,255,0.2); border-radius: 10px; color: var(--accent); font-size: 11.5px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
<div id="app">
    <div id="loading"><div class="loader-ring"></div><p style="font-size:12px;font-weight:700;color:var(--text-soft);">MEMPROSES</p></div>
    <div id="toast">Toast</div>

    <div id="absen-modal" class="modal-wrap">
        <div class="modal-sheet">
            <div class="modal-ico" style="background:var(--green-dim)"><i class="fas fa-check" style="color:var(--green)"></i></div>
            <h3 style="font-size:17px;font-weight:700;text-align:center;">Absen Berhasil!</h3>
            <p style="font-size:12.5px;color:var(--text-soft);text-align:center;margin:5px 0 18px;">Data absensi sudah tersimpan.</p>
            <div style="display:flex;gap:10px">
                <button onclick="closeAbsenModalAndSkipWA()" class="btn btn-glass" style="flex:1;padding:12px;">Lewati</button>
                <button onclick="confirmSendWA()" class="btn btn-success" style="flex:1;padding:12px;"><i class="fab fa-whatsapp"></i> Kirim WA</button>
            </div>
        </div>
    </div>

    <div id="reset-modal" class="modal-wrap" style="align-items:center;padding:20px">
        <div class="modal-sheet-center">
            <div class="modal-ico" style="background:var(--red-dim)"><i class="fas fa-shield-halved" style="color:var(--red)"></i></div>
            <h3 style="font-size:16px;font-weight:700;text-align:center;">Reset Perangkat</h3>
            <p style="font-size:12px;color:var(--text-soft);text-align:center;margin-bottom:18px;">Masukkan password reset</p>
            <input type="password" id="reset-password" class="g-input" style="text-align:center;margin-bottom:14px;">
            <div style="display:flex;gap:10px">
                <button onclick="closeResetModal()" class="btn btn-glass" style="flex:1;">Batal</button>
                <button onclick="confirmReset()" class="btn" style="flex:1;background:var(--red);color:white;border-radius:12px;">Reset</button>
            </div>
        </div>
    </div>

    <div id="import-modal" class="modal-wrap">
        <div class="modal-sheet">
            <div class="modal-ico" style="background:var(--green-dim)"><i class="fas fa-cloud-arrow-up" style="color:var(--green)"></i></div>
            <h3 style="font-size:16px;font-weight:700;text-align:center;">Import Data</h3>
            <p style="font-size:12px;color:var(--text-soft);text-align:center;margin-bottom:16px;">Tempel kode backup</p>
            <textarea id="import-data" rows="5" class="g-input" style="font-family:monospace;font-size:11px;margin-bottom:14px;"></textarea>
            <div style="display:flex;gap:10px">
                <button onclick="closeImportModal()" class="btn btn-glass" style="flex:1;">Batal</button>
                <button onclick="processImport()" class="btn btn-primary" style="flex:1;">Import</button>
            </div>
        </div>
    </div>

    <div id="import-user-modal" class="modal-wrap">
        <div class="modal-sheet">
            <div class="modal-ico" style="background:var(--accent-dim)"><i class="fas fa-user-plus" style="color:var(--accent)"></i></div>
            <h3 style="font-size:16px;font-weight:700;text-align:center;">Import User</h3>
            <p style="font-size:12px;color:var(--text-soft);text-align:center;margin-bottom:18px;">Pilih metode import</p>
            <div style="margin-bottom:18px;">
                <p class="label-xs">Upload File JSON</p>
                <input type="file" id="import-user-file" accept=".json">
            </div>
            <div style="margin-bottom:18px;">
                <p class="label-xs">Download dari Sheet</p>
                <input type="text" id="import-username" placeholder="Username" class="g-input" style="margin-bottom:8px;">
                <button onclick="downloadUserFromSheet()" class="btn btn-primary" style="width:100%;padding:11px;">Download User</button>
            </div>
            <div style="display:flex;gap:10px">
                <button onclick="closeImportUserModal()" class="btn btn-glass" style="flex:1;">Tutup</button>
                <button onclick="syncUsersFromSheet()" class="btn btn-primary" style="flex:1;">Sinkron</button>
            </div>
        </div>
    </div>

    <div id="sync-user-modal" class="modal-wrap" style="align-items:center;padding:20px">
        <div class="modal-sheet-center">
            <div class="modal-ico" style="background:var(--accent-dim)"><i class="fas fa-cloud-arrow-down" style="color:var(--accent)"></i></div>
            <h3 style="font-size:16px;font-weight:700;text-align:center;">Sinkron User</h3>
            <p style="font-size:12px;color:var(--text-soft);text-align:center;margin-bottom:16px;">Masukkan PIN Admin</p>
            <input type="password" id="sync-admin-pin" placeholder="PIN Admin" class="g-input" style="text-align:center;margin-bottom:14px;">
            <div style="display:flex;gap:10px">
                <button onclick="closeSyncUserModal()" class="btn btn-glass" style="flex:1;">Batal</button>
                <button onclick="syncUsersFromSheet()" class="btn btn-primary" style="flex:1;">Sinkron</button>

    <div id="page-content"></div>
    <nav id="bottom-nav" style="display:none">
        <button onclick="router.navigate('home')" id="nav-home" class="nav-item"><i class="fas fa-house"></i><span>Beranda</span></button>
        <button onclick="router.navigate('pos')" id="nav-pos" class="nav-item"><i class="fas fa-cash-register"></i><span>POS</span></button>
        <button onclick="router.navigate('report')" id="nav-report" class="nav-item"><i class="fas fa-chart-line"></i><span>Laporan</span></button>
        <button onclick="router.navigate('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt"></i><span>Riwayat</span></button>
        <button onclick="router.navigate('settings')" id="nav-settings" class="nav-item"><i class="fas fa-sliders"></i><span>Sistem</span></button>

</div>

<script>
// ==================== KONFIGURASI ====================
const ADMIN_WA = "6281514696906";
const OFFICE_LOC = { lat: -6.786168, lng: 106.780918 };
const RADIUS_LIMIT = 200;
const RESET_PASSWORD = "rockyhijab";
const ADMIN_PIN = "123456";
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIpYtoia_yOoAKAs8WZMaY-_Jlm4Hqr3gkQHaRAuf5ogmC0D-8_NePqv1--Ga3bbb0/exec";

let currentUser = null, currentPos = null, db;
let currentFilter = 'daily', rangeStartDate = null, rangeEndDate = null;
let pendingClockInData = null, currentPage = 'home';
let cachedTransactions = [], cachedAttendance = [];
const SYNC_INTERVAL = 30000;

// Theme
const getTheme = () => localStorage.getItem('theme') || 'dark';
const applyTheme = (t) => { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
const toggleTheme = () => { const next = getTheme() === 'dark' ? 'light' : 'dark'; applyTheme(next); };
applyTheme(getTheme());

// ==================== TIME UTILS (TIDAK DIKIRIM KE SERVER) ====================
function formatRupiah(n) { if(!n&&n!==0) return ''; return new Intl.NumberFormat('id-ID').format(n); }
function formatWIBTime(t) { if(!t) return '-'; return t.replace('T',' ').slice(0,19); }
function extractDateFromTime(t) { if(!t) return ''; return t.slice(0,10); }
function getTodayWIB() { const d = new Date(); return d.toISOString().slice(0,10); }
function getNamaBulan(m) { return ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][m-1]; }
function getDaysUntilToday(y,m) { const t=getTodayWIB(), td=parseInt(t.split('-')[2]), cy=parseInt(t.split('-')[0]), cm=parseInt(t.split('-')[1]); return (y===cy && m===cm) ? td : new Date(y,m,0).getDate(); }

// ==================== DB ====================
const initDB = () => new Promise((res,rej) => {
    const r = indexedDB.open("AttendancePOSDB",32);
    r.onupgradeneeded = e => { db=e.target.result; if(!db.objectStoreNames.contains("users")) db.createObjectStore("users",{keyPath:"username"}); if(!db.objectStoreNames.contains("attendance")) db.createObjectStore("attendance",{keyPath:"id",autoIncrement:true}); if(!db.objectStoreNames.contains("transactions")) db.createObjectStore("transactions",{keyPath:"id"}); };
    r.onsuccess = e => { db=e.target.result; res(); };
    r.onerror = e => rej(e);
});
const dbAction = (store,method,data=null) => new Promise((res,rej) => {
    const tx=db.transaction(store,"readwrite"), s=tx.objectStore(store);
    let r; if(method==='add') r=s.add(data); else if(method==='get') r=s.get(data); else if(method==='put') r=s.put(data); else if(method==='getAll') r=s.getAll(); else if(method==='delete') r=s.delete(data); else if(method==='clear') r=s.clear();
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});

// ==================== POST KE SERVER (TANPA KIRIM TIME) ====================
async function postToGAS(payload) {
    delete payload.time;
    delete payload.timestamp;
    const url = GAS_WEB_APP_URL;
    await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    await new Promise(resolve => setTimeout(resolve, 800));
    return { success: true };
}

// ==================== CACHE ====================
const loadCache = async () => {
    if(!currentUser) return;
    const at=await dbAction('transactions','getAll'); cachedTransactions=at.filter(t=>t.user===currentUser.username);
    const aa=await dbAction('attendance','getAll'); cachedAttendance=aa.filter(a=>a.user===currentUser.username);
    const td=getTodayWIB(), has=cachedAttendance.some(a=>extractDateFromTime(a.time)===td);
    localStorage.setItem('has_clocked_in',has?'true':'false');
    if(has) localStorage.setItem('last_attendance_date',td);
};

// ==================== SYNC ====================
const syncFromServer = async (showMsg=false) => {
    if(!currentUser) return;
    if(showMsg) showToast("Sinkronisasi...");
    try {
        const r=await fetch(`${GAS_WEB_APP_URL}?action=get&type=transactions&user=${currentUser.username}&t=${Date.now()}`);
        const d=await r.json();
        if(d?.success&&d.data){
            const old=await dbAction('transactions','getAll'); for(const l of old) if(l.user===currentUser.username) await dbAction('transactions','delete',l.id);
            for(const t of d.data) if(t.user===currentUser.username) await dbAction('transactions','add',{id:t.id,user:t.user,name:t.name,amount:t.amount,note:t.note,time:t.time,serverId:t.id});
        }
        await syncAttendanceFromServer(false); await loadCache(); refreshCurrentPage();
        if(showMsg) showToast(`✓ Sinkron: ${cachedTransactions.length} transaksi`);
    } catch(e){ if(showMsg) showToast("Gagal sync",true); }
};
const syncAttendanceFromServer = async (showMsg=false) => {
    if(!currentUser) return;
    try {
        const r=await fetch(`${GAS_WEB_APP_URL}?action=get&type=attendance&user=${currentUser.username}&t=${Date.now()}`);
        const d=await r.json();
        if(d?.success&&d.data){

const deleteTransaction = async (id,serverId=null,transactionUser=null) => {
    let trx=cachedTransactions.find(t=>t.id===id);
    if(!trx){const all=await dbAction('transactions','getAll');trx=all.find(t=>t.id===id);}
    if(!trx&&serverId){const all=await dbAction('transactions','getAll');trx=all.find(t=>t.serverId===serverId||t.id===serverId);}
    if(!trx){showToast("Transaksi tidak ditemukan!",true);return;}
    let own=false;
    if(trx.user===currentUser.username) own=true;
    else if(trx.name&&trx.name.toLowerCase()===currentUser.name.toLowerCase()) own=true;
    else if(transactionUser===currentUser.username) own=true;
    const isAdmin=currentUser.pin===ADMIN_PIN||currentUser.username.toLowerCase()==='admin';
    if(!own&&!isAdmin){showToast(`Tidak bisa hapus milik ${trx.name||'orang lain'}!`,true);return;}
    const pin=prompt(`Konfirmasi hapus Rp ${formatRupiah(trx.amount)}\nMasukkan PIN:`);
    if(!pin) return;
    if(pin!==currentUser.pin&&!isAdmin){showToast("PIN Salah!",true);return;}
    if(trx.amount>1000000&&!confirm(`⚠️ Nominal besar (Rp ${formatRupiah(trx.amount)})\nYakin hapus?`)) return;
    setLoading(true);
    try {
        if(navigator.onLine&&(serverId||trx.serverId)){const sid=serverId||trx.serverId; if(sid&&sid!=='null') await postToGAS({ type: 'delete_transaction', payload: { id: trx.id, serverId: sid.toString(), user: currentUser.username, pin: currentUser.pin } });}
        await dbAction('transactions','delete',trx.id); cachedTransactions=cachedTransactions.filter(t=>t.id!==trx.id);
        if(navigator.onLine) await syncFromServer(false);
        await renderHistory(); await updateBonusUI();
        showToast(`✓ Hapus Rp ${formatRupiah(trx.amount)}`);
    } catch(e){ showToast("Gagal hapus",true); }
    setLoading(false);
};

const handleClockIn = async () => {
    if(localStorage.getItem('last_attendance_date')===getTodayWIB()||await hasClockedInToday()){showToast("Sudah absen hari ini!");return;}
    if(!currentPos) return showToast("Tunggu lokasi!",true);
    const dist=calculateDistance(currentPos.lat,currentPos.lng,OFFICE_LOC.lat,OFFICE_LOC.lng);
    if(dist>RADIUS_LIMIT) return showToast(`Di luar radius (${Math.round(dist)}m)`,true);
    setLoading(true);
    try {
        // ⭐ TIDAK KIRIM TIME - SERVER YANG NGATUR ⭐
        const data = {
            user: currentUser.username,
            name: currentUser.name,
            loc: currentPos
        };
        const nid = await dbAction('attendance','add',data);
        data.id = nid;
        cachedAttendance.push(data);
        localStorage.setItem('has_clocked_in','true');
        localStorage.setItem('last_attendance_date',getTodayWIB());
        await postToGAS({ type: 'attendance', payload: data });
        showAbsenModal(data);
        if(currentPage==='home') await updateHomeStatus();
        if(currentPage==='pos') await updatePosStatus();
        if(currentPage==='report') await renderReport();
    } catch(e){ showToast("Gagal absen",true); }
    setLoading(false);
};

function calculateDistance(la1,lo1,la2,lo2){const R=6371e3,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

    info.innerHTML=`<span class="loc-chip loc-loading"><i class="fas fa-circle-notch fa-spin"></i> Mencari GPS...</span>`;

    navigator.geolocation.getCurrentPosition(pos=>{
        currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
        const dist=calculateDistance(currentPos.lat,currentPos.lng,OFFICE_LOC.lat,OFFICE_LOC.lng);
        info.innerHTML=dist<=RADIUS_LIMIT

    setLoading(true);
    try {
        const today=new Date(), y=today.getFullYear(), m=today.getMonth()+1, ms=String(m).padStart(2,'0'), td=getTodayWIB();
        let ft=[...cachedTransactions], fa=[...cachedAttendance], pt="", total=0, omzet=0, bonus=0, detail="";
        if(currentFilter==='daily'){pt="📅 HARIAN ("+td+")"; ft=ft.filter(t=>extractDateFromTime(t.time)===td); fa=fa.filter(a=>extractDateFromTime(a.time)===td); total=1; omzet=ft.reduce((a,b)=>a+b.amount,0); bonus=calculateBonus(omzet);}
        else if(currentFilter==='monthly'){pt=`📆 BULANAN (${getNamaBulan(m)} ${y})`; ft=ft.filter(t=>{const d=extractDateFromTime(t.time); if(!d)return false; const[ty,tm]=d.split('-'); return parseInt(ty)===y && tm===ms;}); fa=fa.filter(a=>{const d=extractDateFromTime(a.time); if(!d)return false; const[ay,am]=d.split('-'); return parseInt(ay)===y && am===ms;}); total=getDaysUntilToday(y,m); omzet=ft.reduce((a,b)=>a+b.amount,0); bonus=calculateBonus(omzet);}
        else if(currentFilter==='yearly'){pt=`📅 TAHUNAN (${y})`; ft=ft.filter(t=>extractDateFromTime(t.time).startsWith(`${y}-`)); fa=fa.filter(a=>extractDateFromTime(a.time).startsWith(`${y}-`)); for(let i=1;i<=m;i++) total+=getDaysUntilToday(y,i); omzet=ft.reduce((a,b)=>a+b.amount,0); bonus=calculateBonus(omzet);}
        else if(currentFilter==='range'&&rangeStartDate&&rangeEndDate){pt=`📅 RANGE (${rangeStartDate} s/d ${rangeEndDate})`; ft=ft.filter(t=>{const d=extractDateFromTime(t.time); return d>=rangeStartDate&&d<=rangeEndDate;}); fa=fa.filter(a=>{const d=extractDateFromTime(a.time); return d>=rangeStartDate&&d<=rangeEndDate;}); total=Math.ceil(Math.abs(new Date(rangeEndDate)-new Date(rangeStartDate))/(1000*60*60*24))+1; omzet=ft.reduce((a,b)=>a+b.amount,0); bonus=calculateBonus(omzet);}
        const hd=new Set(); fa.forEach(a=>hd.add(extractDateFromTime(a.time)));
        const th=hd.size, tn=total-th;
        detail=ft.length>0?ft.slice(0,10).map((t,i)=>`${i+1}. [${extractDateFromTime(t.time)}] ${t.note}\n   💵 Rp ${t.amount.toLocaleString()}`).join('\n')+(ft.length>10?`\n... dan ${ft.length-10} lainnya`:""):"(Tidak ada transaksi)";
        let msg=`📊 *LAPORAN STAFF ${pt}* 📊\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n👤 *Nama:* ${currentUser.name}\n🆔 *ID Staff:* ${currentUser.username}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n📈 *RINGKASAN KINERJA:*\n┌───────────────────────────\n│ 📅 Total Hari Kerja : ${total} hari\n│ ✅ Hadir           : ${th} hari\n│ ❌ Tidak Hadir     : ${tn} hari\n│ 💰 Total Omzet     : Rp ${omzet.toLocaleString()}\n└───────────────────────────\n\n🎁 *BONUS YANG DIDAPAT:*\n┌───────────────────────────\n│ 🏆 Bonus : *Rp ${bonus.toLocaleString()}*\n│ 📌 Ket   : Rp 150.000 per Rp 10.000.000 omzet\n└───────────────────────────\n\n📝 *DETAIL TRANSAKSI (10 terakhir):*\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n${detail}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n📊 *RINGKASAN ABSENSI:*\n${fa.map(a=>`✅ ${formatWIBTime(a.time)}`).join('\n')||'❌ Belum ada absen'}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📱 *Dikirim melalui App*\n🕐 ${new Date().toLocaleString('id-ID',{timeZone:'Asia/Jakarta'})}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
        sendWA(msg); showToast("✓ Laporan terkirim!");
    } catch(e){ showToast("Gagal kirim laporan",true); }
    setLoading(false);
};

// ==================== FILTER FUNCTIONS ====================
const setHistoryFilter = f => { currentFilter=f; renderHistory(); };
const filterHistoryByDateRange = () => {
    const s=document.getElementById('history-range-start')?.value, e=document.getElementById('history-range-end')?.value;
    if(s&&e){rangeStartDate=s; rangeEndDate=e; currentFilter='range'; renderHistory();} else showToast("Pilih tanggal!",true);
};
const resetHistoryFilter = () => { rangeStartDate=null; rangeEndDate=null; currentFilter='daily'; renderHistory(); };
const setReportFilter = f => { currentFilter=f; renderReport(); };
const forceResyncAndCleanup = async () => {
    if(!confirm("⚠️ Ini akan menghapus data lokal & mengambil ulang dari server.\nLanjutkan?")) return;
    setLoading(true);
    try {
        const all=await dbAction('transactions','getAll'); for(const t of all) if(t.user===currentUser.username) await dbAction('transactions','delete',t.id);
        await syncFromServer(true); showToast("✓ Resync berhasil!"); await renderHistory();
    } catch(e){ showToast("Gagal resync",true); }
    setLoading(false);
};

const showImportModal = () => { const e=document.getElementById('import-modal'); e.classList.add('show'); e.style.display='flex'; document.getElementById('import-data').value=''; };
const closeImportModal = () => { const e=document.getElementById('import-modal'); e.classList.remove('show'); e.style.display='none'; };
const processImport = async () => {
    const json=document.getElementById('import-data').value; if(!json) return showToast("Masukkan kode backup!",true);
    setLoading(true);
    try {
        const bk=JSON.parse(json);
        await dbAction('users','clear'); await dbAction('attendance','clear'); await dbAction('transactions','clear');
        if(bk.data.users) for(const u of bk.data.users) await dbAction('users','add',u);
        if(bk.data.attendance) for(const a of bk.data.attendance) await dbAction('attendance','add',a);
        if(bk.data.transactions) for(const t of bk.data.transactions) await dbAction('transactions','add',t);
        showToast("✓ Import berhasil!"); closeImportModal(); setTimeout(()=>location.reload(),1500);
    } catch(e){ showToast("Format tidak valid!",true); }
    setLoading(false);
};
const backupData = async () => {
    setLoading(true);
    try {
        const u=await dbAction('users','getAll'), a=await dbAction('attendance','getAll'), t=await dbAction('transactions','getAll');
        const bk={version:"7.0",timestamp:new Date().toISOString(),data:{users:u,attendance:a,transactions:t}};
        const ta=document.createElement("textarea"); ta.value=JSON.stringify(bk); document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        showToast("✓ Data disalin ke Clipboard!");
    } catch(e){ showToast("Gagal backup",true); }
    setLoading(false);
};
const editProfile = async () => {
    const n=prompt("Nama baru:",currentUser.name), p=prompt("PIN baru (angka):",currentUser.pin);
    if(n&&p){ currentUser.name=n; currentUser.pin=p; await dbAction('users','put',currentUser); await postToGAS({ type: 'register', payload: currentUser }); showToast("✓ Profil diupdate"); router.navigate('settings'); }
};
const showSyncUserModal = () => { const e=document.getElementById('sync-user-modal'); e.classList.add('show'); e.style.display='flex'; document.getElementById('sync-admin-pin').value=''; };
const closeSyncUserModal = () => { const e=document.getElementById('sync-user-modal'); e.classList.remove('show'); e.style.display='none'; };
const handleLogout = () => { if(confirm("Keluar dari aplikasi?")){ localStorage.removeItem('current_user'); currentUser=null; cachedTransactions=[]; cachedAttendance=[]; router.navigate('login'); } };

// ==================== SESSION ====================
const checkExistingSession = async () => {
    const sv=localStorage.getItem('current_user');
    if(sv){
        try {
            const ud=JSON.parse(sv), v=await dbAction('users','get',ud.username);
            if(v&&v.pin===ud.pin){ currentUser=v; await loadCache(); if(navigator.onLine) await syncFromServer(false); return true; }
        } catch(e){}
    } return false;
};
